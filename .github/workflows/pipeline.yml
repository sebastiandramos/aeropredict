name: OpenSky Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC
    - cron: '0 20 * * *'  # 20:00 UTC
  workflow_dispatch:       # trigger manual para testing

concurrency:
  group: opensky-pipeline
  cancel-in-progress: false

env:
  OPENSKY_DELTA_ROOT: s3://aeropredict-landing-zone
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
  OPENSKY_CLIENT_ID_PABLO: ${{ secrets.OPENSKY_CLIENT_ID_PABLO }}
  OPENSKY_CLIENT_SECRET_PABLO: ${{ secrets.OPENSKY_CLIENT_SECRET_PABLO }}
  OPENSKY_CLIENT_ID_SEBASTIAN: ${{ secrets.OPENSKY_CLIENT_ID_SEBASTIAN }}
  OPENSKY_CLIENT_SECRET_SEBASTIAN: ${{ secrets.OPENSKY_CLIENT_SECRET_SEBASTIAN }}
  OPENSKY_CLIENT_ID_TOMAS: ${{ secrets.OPENSKY_CLIENT_ID_TOMAS }}
  OPENSKY_CLIENT_SECRET_TOMAS: ${{ secrets.OPENSKY_CLIENT_SECRET_TOMAS }}
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  POSTGRES_URI: ${{ secrets.POSTGRES_URI }}

jobs:
  test:
    name: "0/5 Unit tests + coverage (≥70%)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e ".[dev]"
      - name: Ejecutar tests con cobertura
        run: pytest --cov=src/aeropredict --cov-report=term-missing tests/ --tb=short -q

  extract:
    name: "1/5 Extract → Bronze"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - name: Extraer OpenSky → Bronze Delta (R2)
        run: python scripts/extract_to_bronze.py --days 2

  bronze_to_silver:
    name: "2/5 Bronze → Silver"
    needs: extract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - name: Bronze Delta (R2) → MongoDB Atlas
        run: python scripts/bronze_to_silver.py

  silver_to_gold:
    name: "3/5 Silver → Gold (flights)"
    needs: bronze_to_silver
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - name: MongoDB Atlas → Neon PostgreSQL
        run: python scripts/silver_to_gold.py

  entities_to_gold:
    name: "4/5 Entity tables → Gold"
    needs: silver_to_gold
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - name: Sync aircraft + weather → PostgreSQL
        run: python scripts/silver_to_gold_entities.py

  build_feature_store:
    name: "5/5 Feature store"
    needs: entities_to_gold
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - name: Build gold.feature_store
        run: python scripts/build_feature_store.py

  model_registry_check:
    name: "6/6 Model registry validation"
    needs: build_feature_store
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - name: Validate MLflow model registry
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || 'file:./mlruns' }}
        run: |
          python -c "
          import mlflow
          mlflow.set_tracking_uri('${{ env.MLFLOW_TRACKING_URI }}')
          client = mlflow.MlflowClient()
          versions = client.search_model_versions('name=\"delay-predictor\"')
          if not versions:
              raise ValueError('No model versions found in registry')
          latest = sorted(versions, key=lambda v: int(v.version), reverse=True)[0]
          print(f'Latest model version: {latest.version}')
          print(f'Run ID: {latest.run_id}')
          print(f'Status: {latest.status}')
          "

  api_health_check:
    name: "7/7 API health check"
    needs: model_registry_check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - name: Start API server
        run: |
          uvicorn src.aeropredict.api.server:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI || 'file:./mlruns' }}
          MLFLOW_MODEL_URI: "models:/delay-predictor/production"
      - name: Verify health endpoint
        run: |
          curl -sf http://localhost:8000/health || (echo "Health check failed" && exit 1)
      - name: Verify model version in health response
        run: |
          HEALTH=$(curl -sf http://localhost:8000/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', f\"Status not ok: {data['status']}\"
          assert data['model_version'] is not None, 'model_version is None'
          print(f'Model version: {data[\"model_version\"]}')
          "
      - name: Run sample inference
        run: |
          PREDICTION=$(curl -sf -X POST http://localhost:8000/predict/delay \
            -H "Content-Type: application/json" \
            -d '{
              "hour_of_day": 14,
              "day_of_week": 2,
              "airline": "IB",
              "route_distance": 500.0,
              "aircraft_type": "A320",
              "weather_temperature_2m": 20.0,
              "weather_precipitation": 0.0
            }')
          echo "Prediction response: $PREDICTION"
          echo "$PREDICTION" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'predicted_delay_minutes' in data, 'Missing predicted_delay_minutes'
          assert 'confidence' in data, 'Missing confidence'
          assert 'model_version' in data, 'Missing model_version'
          print(f'Predicted delay: {data[\"predicted_delay_minutes\"]:.2f} min')
          print(f'Confidence: {data[\"confidence\"]}')
          print(f'Model version: {data[\"model_version\"]}')
          "
      - name: Stop API server
        if: always()
        run: pkill -f "uvicorn src.aeropredict.api.server:app" || true
