name: OpenSky Pipeline

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC
    - cron: '0 20 * * *'  # 20:00 UTC
  workflow_dispatch:       # trigger manual para testing

concurrency:
  group: opensky-pipeline
  cancel-in-progress: false

env:
  OPENSKY_DELTA_ROOT: s3://aeropredict-landing-zone

jobs:
  extract:
    name: "1/5 Extract → Bronze"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - uses: dopplerhq/cli-action@v3
      - name: Debug - listar secrets disponibles
        run: doppler run -- env | grep OPENSKY | sed 's/=.*/=***/'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
      - name: Extraer OpenSky → Bronze Delta (R2)
        run: doppler run -- python scripts/extract_to_bronze.py --days 2
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  bronze_to_silver:
    name: "2/5 Bronze → Silver"
    needs: extract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - uses: dopplerhq/cli-action@v3
      - name: Bronze Delta (R2) → MongoDB Atlas
        run: doppler run -- python scripts/bronze_to_silver.py
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  silver_to_gold:
    name: "3/5 Silver → Gold (flights)"
    needs: bronze_to_silver
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - uses: dopplerhq/cli-action@v3
      - name: MongoDB Atlas → Neon PostgreSQL
        run: doppler run -- python scripts/silver_to_gold.py
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  entities_to_gold:
    name: "4/5 Entity tables → Gold"
    needs: silver_to_gold
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - uses: dopplerhq/cli-action@v3
      - name: Sync aircraft + weather → PostgreSQL
        run: doppler run -- python scripts/silver_to_gold_entities.py
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

  build_feature_store:
    name: "5/5 Feature store"
    needs: entities_to_gold
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar dependencias
        run: pip install -e .
      - uses: dopplerhq/cli-action@v3
      - name: Build gold.feature_store
        run: doppler run -- python scripts/build_feature_store.py
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}